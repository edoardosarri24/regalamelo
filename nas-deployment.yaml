version: '3.8'

services:
  frontend:
    container_name: frontend
    image: ghcr.io/edoardosarri24/regalamelo-frontend:main
    restart: always
    environment:
      - VITE_API_BASE_URL=https://regalamelo.edoardosarri.com/api/v1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    container_name: api
    image: ghcr.io/edoardosarri24/regalamelo-backend:main
    restart: always
    environment:
      - DATABASE_URL=postgresql://giftlistuser:miaPasswordSicura@db:5432/giftlistdb
      - PORT=3000
      - CORS_ORIGIN=https://regalamelo.edoardosarri.com
      - FRONTEND_URL=https://regalamelo.edoardosarri.com
      - JWT_SECRET=DquWtjmyokZOHxXCr6HGYiu/N6k3P+6Z
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=regalamelo.app@gmail.com
      - SMTP_PASS=vrrmdlevlxhfshlh
    depends_on:
      - db
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:17-alpine
    restart: always
    volumes:
      - NAS_DATABASE_DATA:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=giftlistdb
      - POSTGRES_USER=giftlistuser
      - POSTGRES_PASSWORD=miaPasswordSicura
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=eyJhIjoiNjAxZGFlNDk1ODM0NzUyMjU4NjYwMzMwMWFiZGFlOTMiLCJ0IjoiNTY5YWI0NGYtZjA2My00ZGUzLTg3N2MtNWViZDg0MjlhZGQzIiwicyI6Ill6azRORE00WTJFdFltTmhOQzAwTUdVMkxXSXlORGt0TnpZM09EaGxOR0l6T1RWbCJ9
    depends_on:
      - frontend
      - api

  watchtower:
    image: containrrr/watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 frontend api

  db-backup:
    image: prodrigestivill/postgres-backup-local
    restart: always
    volumes:
      - NAS_DATABASE_DATA:/var/lib/postgresql/data:ro
      - ./backups:/backups
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=giftlistdb
      - POSTGRES_USER=giftlistuser
      - POSTGRES_PASSWORD=miaPasswordSicura
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=7
    depends_on:
      - db

volumes:
  NAS_DATABASE_DATA:
